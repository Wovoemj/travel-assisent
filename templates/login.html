<!-- templates/login.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 智能旅游助手</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
 body {
        min-height: 100vh;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        transition: background-image 0.5s ease;
        position: relative;
    }
    body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        filter: brightness(0.7) blur(3px);
        z-index: -1;
        transition: background-image 0.5s ease;
        background-image: url('{{ background_image if background_image else url_for("static", filename="images/default-bg.jpg") }}');
    }
    /* 其他样式保持不变 */

        .content-wrapper {
            position: relative;
            z-index: 2;
        }
        .login-card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.98);
            border-radius: 32px;
            box-shadow: 0 30px 60px rgba(0,0,0,1);
            width: 100%;
            max-width: 520px;
            padding: 3rem;
        }
        .tab-active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
            font-weight: 600;
        }
        .tab-inactive {
            color: #9ca3af;
            font-weight: 500;
        }
        .input-field {
            transition: all 0.3s ease;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            padding: 1rem 1.25rem;
            font-size: 1rem;
            width: 100%;
            background: white;
        }
        .input-field:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            outline: none;
        }
        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }
        .input-icon {
            position: absolute;
            right: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 1.25rem;
        }
        .social-btn {
            transition: all 0.3s ease;
            border-radius: 20px;
            padding: 1rem;
            background: #f9fafb;
            border: 2px solid #f3f4f6;
        }
        .social-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            border-color: transparent;
        }
        .code-btn {
            transition: all 0.3s ease;
            border-radius: 16px;
            padding: 1rem 1.5rem;
            background: #f3f4f6;
            color: #4b5563;
            font-weight: 500;
            white-space: nowrap;
            border: 2px solid transparent;
        }
        .code-btn:hover:not(:disabled) {
            background: #e5e7eb;
            transform: translateY(-2px);
        }
        .code-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .login-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 1.2rem;
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
            width: 100%;
            border: none;
            transition: all 0.3s ease;
            margin-top: 1.5rem;
        }
        .login-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.4);
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #9ca3af;
            margin: 2rem 0;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 2px solid #e5e7eb;
        }
        .divider span {
            padding: 0 1rem;
            font-size: 0.95rem;
            font-weight: 500;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            color: white;
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 2rem;
            padding: 0.75rem 1.5rem;
            background: rgba(255,255,255,0.2);
            border-radius: 50px;
            transition: all 0.3s ease;
        }
        .back-link:hover {
            background: rgba(255,255,255,0.3);
            transform: translateX(-5px);
        }
        .location-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-size: 0.95rem;
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 3;
            pointer-events: none;
        }
        .refresh-bg {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-size: 0.95rem;
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 3;
        }
        .refresh-bg:hover {
            background: rgba(0,0,0,0.7);
            transform: scale(1.05);
        }
        .footer-text {
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="content-wrapper min-h-screen flex items-center justify-center p-6">
        <div class="w-full max-w-2xl">
            <!-- 返回首页链接 -->
            <a href="/" class="back-link">
                <i class="fas fa-arrow-left mr-3 text-lg"></i> 返回首页
            </a>

            <!-- 登录卡片 -->
            <div class="login-card">
                <!-- Logo和标题 -->
                <div class="text-center mb-10">
                    <div class="inline-flex items-center justify-center w-24 h-24 bg-gradient-to-r from-purple-500 to-pink-500 rounded-3xl mb-6 shadow-xl">
                        <i class="fas fa-plane text-white text-4xl"></i>
                    </div>
                    <h2 class="text-4xl font-bold text-gray-800 mb-3">欢迎回来</h2>
                    <p class="text-gray-500 text-lg">登录您的智能旅游助手账号</p>
                </div>

                <!-- 登录方式切换标签 -->
                <div class="flex border-b-2 border-gray-100 mb-8">
                    <button id="passwordTab" class="flex-1 py-3 text-center text-lg tab-active" onclick="switchTab('password')">
                        密码登录
                    </button>
                    <button id="codeTab" class="flex-1 py-3 text-center text-lg tab-inactive hover:text-gray-700" onclick="switchTab('code')">
                        验证码登录
                    </button>
                </div>

                <!-- 密码登录表单 -->
                <form id="passwordLoginForm" class="space-y-2">
                    <div class="input-group">
                        <input type="text" id="account" name="account"
                               class="input-field"
                               placeholder="用户名/手机号/邮箱">
                        <i class="fas fa-user input-icon"></i>
                    </div>

                    <!-- 密码输入框区域 - 修改为 -->
<div class="input-group">
    <input type="password" id="password" name="password"
           class="input-field"
           placeholder="请输入密码">
    <button type="button" onclick="togglePassword()"
            class="absolute right-12 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600 focus:outline-none">
        <i class="fas fa-eye" id="togglePasswordIcon"></i>
    </button>
    <i class="fas fa-lock input-icon"></i>
</div>

                    <div class="flex items-center justify-between mt-4">
                        <label class="flex items-center cursor-pointer">
                            <input type="checkbox" id="remember" class="w-5 h-5 text-purple-600 border-2 border-gray-300 rounded-lg focus:ring-purple-500">
                            <span class="ml-2 text-gray-600">记住我</span>
                        </label>
                        <a href="#" class="text-purple-600 hover:text-purple-800 font-medium">
                            忘记密码？
                        </a>
                    </div>

                    <button type="submit" class="login-btn">
                        登 录
                    </button>
                </form>

                <!-- 验证码登录表单（初始隐藏） -->
                <form id="codeLoginForm" class="space-y-2 hidden">
                    <div class="input-group">
                        <input type="tel" id="phone" name="phone"
                               class="input-field"
                               placeholder="请输入手机号">
                        <i class="fas fa-mobile-alt input-icon"></i>
                    </div>

                    <div class="flex space-x-3">
                        <div class="flex-1 input-group">
                            <input type="text" id="code" name="code"
                                   class="input-field"
                                   placeholder="请输入验证码">
                            <i class="fas fa-shield-alt input-icon"></i>
                        </div>
                        <button type="button" id="sendCodeBtn" onclick="sendVerificationCode()"
                                class="code-btn">
                            获取验证码
                        </button>
                    </div>

                    <button type="submit" class="login-btn">
                        登录 / 注册
                    </button>
                </form>

                <!-- 错误提示 -->
                <div id="errorMessage" class="mt-6 bg-red-50 border-2 border-red-200 text-red-600 px-6 py-4 rounded-2xl hidden">
                    <i class="fas fa-exclamation-circle mr-2"></i>
                    <span id="errorText"></span>
                </div>

                <!-- 社交登录 -->
                <div class="divider">
                    <span>其他登录方式</span>
                </div>

                <div class="grid grid-cols-3 gap-4">
                    <!-- 微信登录 -->
                    <button onclick="socialLogin('wechat')" class="social-btn flex flex-col items-center">
                        <i class="fab fa-weixin text-green-500 text-3xl mb-2"></i>
                        <span class="text-sm font-medium text-gray-600">微信</span>
                    </button>

                    <!-- QQ登录 -->
                    <button onclick="socialLogin('qq')" class="social-btn flex flex-col items-center">
                        <i class="fab fa-qq text-blue-500 text-3xl mb-2"></i>
                        <span class="text-sm font-medium text-gray-600">QQ</span>
                    </button>

                    <!-- 微博登录 -->
                    <button onclick="socialLogin('weibo')" class="social-btn flex flex-col items-center">
                        <i class="fab fa-weibo text-red-500 text-3xl mb-2"></i>
                        <span class="text-sm font-medium text-gray-600">微博</span>
                    </button>
                </div>

                <!-- 注册链接 -->
                <div class="text-center mt-8 pt-6 border-t-2 border-gray-100">
                    <p class="text-gray-600 text-lg">
                        还没有账号？
                        <a href="/register-page" class="text-purple-600 hover:text-purple-800 font-bold ml-2">
                            立即注册 <i class="fas fa-arrow-right ml-1"></i>
                        </a>
                    </p>
                </div>

                <!-- 管理员登录入口 -->
                <div class="text-center mt-4">
                    <a href="/admin/login" class="text-gray-400 hover:text-gray-600 text-sm transition-colors">
                        <i class="fas fa-user-shield mr-1"></i>管理员登录
                    </a>
                </div>
            </div>

            <!-- 底部信息 -->
            <p class="text-center footer-text text-base mt-8">
                © 2024 智能旅游助手. 保留所有权利.
            </p>
        </div>
    </div>

    <!-- 社交登录模态框 -->
    <div id="socialLoginModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-3xl p-8 max-w-md w-full">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold" id="socialModalTitle">微信登录</h3>
                <button onclick="closeSocialModal()" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times text-2xl"></i>
                </button>
            </div>
            <div id="socialQRCode" class="flex justify-center mb-6">
                <div class="w-64 h-64 bg-gray-100 flex items-center justify-center">
                    <i class="fas fa-spinner fa-spin text-4xl text-gray-400"></i>
                </div>
            </div>
            <div class="text-center text-gray-600">
                <p>请使用<span id="socialAppName">微信</span>扫描二维码登录</p>
                <p class="text-sm text-gray-400 mt-2">扫描后请在手机上确认登录</p>
            </div>
            <div class="mt-6 text-center">
                <button onclick="switchLoginMethod()" class="text-purple-600 hover:text-purple-800">
                    <i class="fas fa-keyboard mr-1"></i>使用账号密码登录
                </button>
            </div>
        </div>
    </div>

    <!-- 地点信息标签（由JS动态生成） -->
    <!-- 切换背景按钮 -->
    <div class="refresh-bg" onclick="refreshBackground()">
        <i class="fas fa-sync-alt mr-2"></i> 切换背景
    </div>

    <!-- Alpine.js 用于下拉菜单 -->
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

    <script>
        // ==================== 背景图片管理 ====================
        let currentBgData = null;
        let loadTimeout = null;

        function loadBackgroundImage(bgData) {
            if (loadTimeout) clearTimeout(loadTimeout);

            const img = new Image();

            img.onload = function() {
                document.body.style.backgroundImage = `url('${bgData.image}')`;
                document.body.style.backgroundSize = 'cover';
                document.body.style.backgroundPosition = 'center';
                document.body.style.backgroundAttachment = 'fixed';

                updateLocationBadge(bgData.name, bgData.location);

                currentBgData = bgData;
                localStorage.setItem('lastBackground', JSON.stringify(bgData));
            };

            img.onerror = function() {
                console.log('背景图片加载失败，使用渐变');
                fallbackToGradient(bgData.name, bgData.location);
            };

            loadTimeout = setTimeout(function() {
                if (!img.complete || img.naturalHeight === 0) {
                    console.log('背景图片加载超时');
                    fallbackToGradient(bgData.name, bgData.location);
                }
            }, 5000);

            img.src = bgData.image;
        }

        function updateLocationBadge(name, location) {
            let badge = document.querySelector('.location-badge');
            if (!badge) {
                badge = document.createElement('div');
                badge.className = 'location-badge';
                document.body.appendChild(badge);
            }
            badge.innerHTML = `<i class="fas fa-map-marker-alt mr-2"></i>${name} · ${location}`;
        }

        function fallbackToGradient(name, location) {
            document.body.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
            document.body.style.backgroundSize = 'cover';
            if (name && location) {
                updateLocationBadge(name, location);
            } else {
                const badge = document.querySelector('.location-badge');
                if (badge) badge.remove();
            }
        }

        function refreshBackground() {
            const refreshBtn = document.querySelector('.refresh-bg i');
            refreshBtn.classList.add('animate-spin');

            fetch('/api/random-background')
                .then(response => response.json())
                .then(data => {
                    loadBackgroundImage(data);
                })
                .catch(error => {
                    console.error('获取背景失败:', error);
                    fallbackToGradient();
                })
                .finally(() => {
                    setTimeout(() => refreshBtn.classList.remove('animate-spin'), 500);
                });
        }

        function initBackground() {
            const saved = localStorage.getItem('lastBackground');
            if (saved) {
                try {
                    const bgData = JSON.parse(saved);
                    loadBackgroundImage(bgData);
                    return;
                } catch (e) {
                    console.log('解析保存的背景失败');
                }
            }
            refreshBackground();
        }

        // ==================== 登录功能 ====================
        let currentProvider = '';
        let qrState = '';
        let qrCheckInterval = null;

        function switchTab(tab) {
            const passwordTab = document.getElementById('passwordTab');
            const codeTab = document.getElementById('codeTab');
            const passwordForm = document.getElementById('passwordLoginForm');
            const codeForm = document.getElementById('codeLoginForm');

            if (tab === 'password') {
                passwordTab.className = 'flex-1 py-3 text-center text-lg tab-active';
                codeTab.className = 'flex-1 py-3 text-center text-lg tab-inactive hover:text-gray-700';
                passwordForm.classList.remove('hidden');
                codeForm.classList.add('hidden');
            } else {
                codeTab.className = 'flex-1 py-3 text-center text-lg tab-active';
                passwordTab.className = 'flex-1 py-3 text-center text-lg tab-inactive hover:text-gray-700';
                codeForm.classList.remove('hidden');
                passwordForm.classList.add('hidden');
            }
        }

        let countdown = 60;
        let timer = null;

            function togglePassword() {
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.getElementById('togglePasswordIcon');

        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.className = 'fas fa-eye-slash';
        } else {
            passwordInput.type = 'password';
            toggleIcon.className = 'fas fa-eye';
        }
    }

        function sendVerificationCode() {
            const phone = document.getElementById('phone').value;
            const sendBtn = document.getElementById('sendCodeBtn');

            if (!phone || !/^1[3-9]\d{9}$/.test(phone)) {
                showError('请输入正确的手机号');
                return;
            }

            sendBtn.disabled = true;
            countdown = 60;
            sendBtn.textContent = `${countdown}秒后重试`;

            timer = setInterval(() => {
                countdown--;
                sendBtn.textContent = `${countdown}秒后重试`;

                if (countdown <= 0) {
                    clearInterval(timer);
                    sendBtn.disabled = false;
                    sendBtn.textContent = '获取验证码';
                }
            }, 1000);

            fetch('/api/send_code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showMessage('验证码已发送', 'success');
                } else {
                    showError(data.error || '发送失败');
                }
            })
            .catch(error => {
                showError('网络错误，请重试');
            });
        }

        document.getElementById('passwordLoginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const account = document.getElementById('account').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: account, password, remember })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('登录成功！正在跳转...', 'success');
                    setTimeout(() => window.location.href = '/', 1500);
                } else {
                    showError(data.error || '登录失败');
                }
            } catch (error) {
                showError('网络错误，请重试');
            }
        });

        document.getElementById('codeLoginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const phone = document.getElementById('phone').value;
            const code = document.getElementById('code').value;

            if (!phone || !code) {
                showError('请填写手机号和验证码');
                return;
            }

            try {
                const response = await fetch('/api/login/code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, code })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('登录成功！正在跳转...', 'success');
                    setTimeout(() => window.location.href = '/', 1500);
                } else {
                    showError(data.error || '登录失败');
                }
            } catch (error) {
                showError('网络错误，请重试');
            }
        });

        function socialLogin(provider) {
            currentProvider = provider;
            const titles = {
                'wechat': '微信登录',
                'qq': 'QQ登录',
                'weibo': '微博登录'
            };
            const appNames = {
                'wechat': '微信',
                'qq': 'QQ',
                'weibo': '微博'
            };

            document.getElementById('socialModalTitle').textContent = titles[provider];
            document.getElementById('socialAppName').textContent = appNames[provider];
            document.getElementById('socialLoginModal').classList.remove('hidden');
            loadQRCode(provider);
        }

        function loadQRCode(provider) {
            const qrContainer = document.getElementById('socialQRCode');
            qrContainer.innerHTML = '<div class="w-64 h-64 bg-gray-100 flex items-center justify-center"><i class="fas fa-spinner fa-spin text-4xl text-gray-400"></i></div>';

            if (provider === 'wechat') {
                window.location.href = `/auth/wechat`;
            } else if (provider === 'qq') {
                fetch('/api/qq/qrcode')
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            qrState = data.state;
                            qrContainer.innerHTML = `<img src="${data.qr_code}" class="w-64 h-64">`;
                            startQrCheck();
                        }
                    });
            } else if (provider === 'weibo') {
                fetch('/auth/weibo')
                    .then(response => response.text())
                    .then(html => {
                        const iframe = document.createElement('iframe');
                        iframe.srcdoc = html;
                        iframe.style.width = '300px';
                        iframe.style.height = '300px';
                        iframe.style.border = 'none';
                        qrContainer.innerHTML = '';
                        qrContainer.appendChild(iframe);
                    });
            }
        }

        function startQrCheck() {
            if (qrCheckInterval) clearInterval(qrCheckInterval);
            qrCheckInterval = setInterval(() => {
                fetch(`/api/qq/check_login?state=${qrState}`)
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === 'logged_in') {
                            clearInterval(qrCheckInterval);
                            showMessage('登录成功！正在跳转...', 'success');
                            setTimeout(() => window.location.reload(), 1500);
                        }
                    });
            }, 2000);
        }

        function closeSocialModal() {
            document.getElementById('socialLoginModal').classList.add('hidden');
            if (qrCheckInterval) {
                clearInterval(qrCheckInterval);
                qrCheckInterval = null;
            }
        }

        function switchLoginMethod() {
            closeSocialModal();
            switchTab('password');
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorDiv.classList.remove('hidden');
            errorText.textContent = message;
            setTimeout(() => errorDiv.classList.add('hidden'), 3000);
        }

        function showMessage(message, type = 'info') {
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');

            if (type === 'success') {
                errorDiv.className = 'mt-6 bg-green-50 border-2 border-green-200 text-green-600 px-6 py-4 rounded-2xl';
            } else {
                errorDiv.className = 'mt-6 bg-blue-50 border-2 border-blue-200 text-blue-600 px-6 py-4 rounded-2xl';
            }

            errorDiv.classList.remove('hidden');
            errorText.textContent = message;
            setTimeout(() => errorDiv.classList.add('hidden'), 3000);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', initBackground);
    </script>
</body>
</html>
