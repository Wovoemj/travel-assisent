{% extends "base.html" %}

{% block title %}QQ登录 - 智能旅游助手{% endblock %}

{% block extra_css %}
<link href="https://cdn.bootcdn.net/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
<style>
    body::before { filter: brightness(0.6) blur(3px); }
{% endblock %}

{% block navbar %}{% endblock %}
{% block footer %}{% endblock %}

{% block main_class %}min-h-screen flex items-center justify-center p-6{% endblock %}

{% block content %}
<div class="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full">
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-blue-500 rounded-full mb-4">
            <i class="fab fa-qq text-white text-4xl"></i>
        </div>
        <h2 class="text-3xl font-bold text-gray-800">QQ登录</h2>
        <p class="text-gray-500 mt-2">请使用手机QQ扫描二维码</p>
    </div>
    <div class="flex justify-center mb-6">
        <img src="{{ qr_code }}" alt="QQ登录二维码" class="w-64 h-64 border-2 border-gray-200 rounded-lg">
    </div>
    <div class="text-center text-gray-600">
        <p class="mb-2">1. 打开手机QQ</p>
        <p class="mb-2">2. 点击右上角"+"号，选择"扫一扫"</p>
        <p class="mb-4">3. 扫描二维码确认登录</p>
    </div>
    <div class="text-center mt-6 pt-4 border-t border-gray-200">
        <a href="/login-page" class="text-purple-600 hover:text-purple-800"><i class="fas fa-arrow-left mr-1"></i>返回登录页面</a>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const state = "{{ state }}";
    let checkCount = 0;
    function checkLoginStatus() {
        fetch(`/api/qq/check_login?state=${state}`)
            .then(r => r.json())
            .then(d => {
                if (d.status === 'logged_in') window.location.href = '/';
                else if (checkCount < 60) { checkCount++; setTimeout(checkLoginStatus, 2000); }
            });
    }
    setTimeout(checkLoginStatus, 2000);
</script>
{% endblock %}
