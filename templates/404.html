{% extends "base.html" %}

{% block title %}页面未找到 - 404{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row">
        <div class="col-lg-6 mx-auto text-center">
            <div class="card shadow-sm">
                <div class="card-body p-5">
                    <i class="bi bi-emoji-frown display-1 text-warning mb-4"></i>
                    <h1 class="display-4">404</h1>
                    <h2 class="mb-3">页面未找到</h2>
                    <p class="lead text-muted mb-4">抱歉，您访问的页面不存在或已被移除。</p>
                    <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg me-2">
                        <i class="bi bi-house"></i> 返回首页
                    </a>
                    <a href="javascript:history.back()" class="btn btn-outline-secondary btn-lg">
                        <i class="bi bi-arrow-left"></i> 返回上一页
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
