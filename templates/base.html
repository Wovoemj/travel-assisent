<!-- templates/base.html - 基础模板 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}智能旅游助手{% endblock %}</title>
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="您的智能旅行伙伴，帮助您发现中国最美的风景">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="旅游助手">
    <meta name="msapplication-TileColor" content="#667eea">
    <meta name="msapplication-tap-highlight" content="no">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/static/manifest.json">
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/static/images/icon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/images/icon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/images/icon-180x180.png">
    <link rel="mask-icon" href="/static/images/safari-pinned-tab.svg" color="#667eea">
    
    <!-- 预加载关键资源 -->
    <link rel="dns-prefetch" href="cdn.bootcdn.net">
    <link rel="dns-prefetch" href="cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://cdn.bootcdn.net" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- 优化后的CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/optimized.css') }}">
    <!-- 界面美化CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/beautify.css') }}">
    
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('{{ background_image if background_image else "/static/images/default-bg.jpg" }}');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: brightness(0.7) blur(3px);
            z-index: -1;
            transition: background-image 0.5s ease-in-out;
        }

        .gradient-bg { background: var(--gradient); }

        .hover-lift { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .hover-lift:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.12) !important; }

        .nav-link {
            position: relative;
            transition: color 0.3s ease;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--gradient);
            transition: width 0.3s ease;
        }
        .nav-link:hover::after,
        .nav-link.active::after { width: 100%; }

        .card {
            border: none;
            border-radius: 16px;
            overflow: hidden;
            background-color: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(10px);
        }

        nav.bg-white {
            background-color: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(5px);
        }

        footer {
            background-color: rgba(31, 41, 55, 0.95) !important;
            backdrop-filter: blur(5px);
        }
        footer a { color: #a0a0a0; text-decoration: none; transition: color 0.3s ease; }
        footer a:hover { color: #667eea; }

        .btn-primary {
            background: var(--gradient);
            border: none;
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-outline-primary {
            border-color: var(--primary);
            color: var(--primary);
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        .btn-outline-primary:hover {
            background: var(--gradient);
            border-color: transparent;
        }

        .breadcrumb { background: transparent; padding: 0; }
        .breadcrumb-item a { color: var(--primary); text-decoration: none; }
        .breadcrumb-item a:hover { text-decoration: underline; }

        .page-link { color: var(--primary); border-radius: 8px; margin: 0 2px; border: none; transition: all 0.3s ease; }
        .page-item.active .page-link { background: var(--gradient); border: none; }
        .page-link:hover { background-color: rgba(102, 126, 234, 0.1); color: var(--primary); }

        .modal-content { border: none; border-radius: 20px; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 4px; }

        .bg-switch-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            border-radius: 50px;
            padding: 10px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            color: #4a5568;
        }
        .bg-switch-btn:hover { background: white; transform: scale(1.05); }
        .bg-switch-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .location-badge {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            color: white;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.2);
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, -20px); }
            10% { opacity: 1; transform: translate(-50%, 0); }
            90% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, -20px); }
        }
        .animate-fade-in-out { animation: fadeInOut 3s ease forwards; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- 导航栏 -->
    {% block navbar %}
    {% include 'partials/navbar.html' %}
    {% endblock %}

    <!-- 主内容区 -->
    <main class="{% block main_class %}container py-4{% endblock %}">
        {% block content %}{% endblock %}
    </main>

    <!-- 页脚 -->
    {% block footer %}
    {% include 'partials/footer.html' %}
    {% endblock %}

    <!-- 背景切换按钮 -->
    <button class="bg-switch-btn" onclick="changeBackground()">
        <i class="fas fa-image me-2"></i>切换背景
    </button>

    <!-- 地点标签 -->
    <div class="location-badge" id="locationBadge">
        <i class="fas fa-map-marker-alt me-2"></i>加载中...
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
    <!-- Alpine.js -->
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <!-- 公共 JS -->
    <script src="{{ url_for('static', filename='js/common.js') }}"></script>

    <script>
        // 页面加载完成后初始化背景
        document.addEventListener('DOMContentLoaded', function() {
            BackgroundManager.loadSaved();

            // 重新绑定背景切换按钮
            const bgSwitchBtn = document.querySelector('.bg-switch-btn');
            if (bgSwitchBtn) {
                bgSwitchBtn.replaceWith(bgSwitchBtn.cloneNode(true));
                const newBtn = document.querySelector('.bg-switch-btn');
                newBtn.addEventListener('click', changeBackground);
            }
        });
    </script>

    <!-- Service Worker 注册 -->
    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
            navigator.serviceWorker.register('/static/sw.js')
                .then(function(registration) {
                    console.log('ServiceWorker 注册成功: ', registration.scope);
                    registration.addEventListener('updatefound', function() {
                        const newWorker = registration.installing;
                        newWorker.addEventListener('statechange', function() {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                showUpdateNotification();
                            }
                        });
                    });
                })
                .catch(function(error) {
                    console.log('ServiceWorker 注册失败: ', error);
                });
        });
    }

    function showUpdateNotification() {
        const notification = document.createElement('div');
        notification.className = 'position-fixed bottom-0 start-50 translate-middle-x mb-4';
        notification.style.cssText = 'z-index: 9999; background: white; padding: 1rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); max-width: 90%; text-align: center;';
        notification.innerHTML = `
            <div class="mb-2"><i class="fas fa-sync-alt text-primary me-2"></i><strong>新版本可用</strong></div>
            <p class="mb-3 small text-muted">应用已更新，刷新页面获取最新功能</p>
            <div>
                <button class="btn btn-primary btn-sm me-2" onclick="updateApp()">立即更新</button>
                <button class="btn btn-outline-secondary btn-sm" onclick="this.parentElement.parentElement.remove()">稍后</button>
            </div>
        `;
        document.body.appendChild(notification);
    }

    function updateApp() {
        if (navigator.serviceWorker.controller) {
            navigator.serviceWorker.controller.postMessage({ type: 'SKIP_WAITING' });
        }
    }
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
