{% extends 'admin/layout.html' %}
{% block page_title %}美食管理{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0"><i class="fas fa-utensils me-2"></i>美食管理</h4>
    <button class="btn btn-primary" onclick="showAddModal()"><i class="fas fa-plus me-1"></i>添加美食</button>
</div>

<div class="card mb-3">
    <div class="card-body">
        <div class="row g-2">
            <div class="col-md-3"><input type="text" class="form-control" id="searchKw" placeholder="搜索美食名..." onkeyup="loadFoods(1)"></div>
            <div class="col-md-2"><input type="text" class="form-control" id="filterCity" placeholder="按城市筛选..." onkeyup="loadFoods(1)"></div>
            <div class="col-md-2">
                <select class="form-select" id="filterCategory" onchange="loadFoods(1)">
                    <option value="">全部分类</option>
                    <option value="小吃">小吃</option>
                    <option value="甜品">甜品</option>
                    <option value="饮品">饮品</option>
                    <option value="正餐">正餐</option>
                </select>
            </div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-body p-0">
        <table class="table mb-0">
            <thead><tr><th>ID</th><th>名称</th><th>城市</th><th>分类</th><th>评分</th><th>价格</th><th>状态</th><th>操作</th></tr></thead>
            <tbody id="foodBody"></tbody>
        </table>
    </div>
    <div class="card-footer bg-white d-flex justify-content-between">
        <span class="text-muted" id="totalInfo"></span>
        <div class="btn-group btn-group-sm" id="pageNav"></div>
    </div>
</div>

<div class="modal fade" id="foodModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">添加美食</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">美食名称 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="inputName" required>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">城市</label>
                        <input type="text" class="form-control" id="inputCity">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">省份</label>
                        <input type="text" class="form-control" id="inputProvince">
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-3 mb-3">
                        <label class="form-label">分类</label>
                        <select class="form-select" id="inputCategory">
                            <option value="正餐">正餐</option>
                            <option value="小吃">小吃</option>
                            <option value="甜品">甜品</option>
                            <option value="饮品">饮品</option>
                        </select>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">评分</label>
                        <input type="number" step="0.1" min="1" max="5" class="form-control" id="inputRating" value="4.5">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">价格范围</label>
                        <input type="text" class="form-control" id="inputPrice" placeholder="如：¥15-30">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">热度</label>
                        <input type="number" step="0.1" class="form-control" id="inputPopularity" value="50">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">描述</label>
                    <textarea class="form-control" id="inputDesc" rows="3"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">推荐餐厅（JSON数组）</label>
                    <textarea class="form-control" id="inputRestaurants" rows="2" placeholder='["餐厅1","餐厅2"]'></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">封面图URL</label>
                    <input type="text" class="form-control" id="inputImage">
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="inputActive" checked>
                    <label class="form-check-label">启用</label>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveFood()">保存</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let curPage=1;
async function loadFoods(page) {
    curPage=page;
    let url=`/api/v2/foods?page=${page}&per_page=20`;
    const kw=document.getElementById('searchKw').value;
    const city=document.getElementById('filterCity').value;
    const cat=document.getElementById('filterCategory').value;
    if(kw) url+=`&keyword=${kw}`;
    if(city) url+=`&city=${city}`;
    if(cat) url+=`&category=${cat}`;
    const res=await fetch(url);
    const d=await res.json();
    if(!d.success) return;
    document.getElementById('foodBody').innerHTML=d.data.map(f=>`
        <tr>
            <td>${f.id}</td>
            <td><strong>${f.name}</strong></td>
            <td>${f.city||'-'}</td>
            <td><span class="badge bg-warning text-dark">${f.category||'-'}</span></td>
            <td>⭐${f.rating}</td>
            <td>${f.price_range||'-'}</td>
            <td><span class="badge bg-${f.is_active?'success':'secondary'}">${f.is_active?'启用':'禁用'}</span></td>
            <td>
                <button class="btn btn-sm btn-outline-primary btn-action" onclick="editFood(${f.id})"><i class="fas fa-edit"></i></button>
                <button class="btn btn-sm btn-outline-danger btn-action" onclick="deleteFood(${f.id},'${f.name}')"><i class="fas fa-trash"></i></button>
            </td>
        </tr>
    `).join('');
    document.getElementById('totalInfo').textContent=`共 ${d.total} 条`;
}

function showAddModal(){
    document.getElementById('modalTitle').textContent='添加美食';
    document.getElementById('editId').value='';
    ['inputName','inputCity','inputProvince','inputPrice','inputDesc','inputRestaurants','inputImage'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('inputCategory').value='正餐';
    document.getElementById('inputRating').value='4.5';
    document.getElementById('inputPopularity').value='50';
    document.getElementById('inputActive').checked=true;
    new bootstrap.Modal(document.getElementById('foodModal')).show();
}

async function editFood(id){
    const res=await fetch(`/api/v2/foods/${id}`);
    const d=await res.json();
    if(!d.success) return alert('加载失败');
    const f=d.data;
    document.getElementById('modalTitle').textContent='编辑美食';
    document.getElementById('editId').value=f.id;
    document.getElementById('inputName').value=f.name;
    document.getElementById('inputCity').value=f.city||'';
    document.getElementById('inputProvince').value=f.province||'';
    document.getElementById('inputCategory').value=f.category||'正餐';
    document.getElementById('inputRating').value=f.rating;
    document.getElementById('inputPrice').value=f.price_range||'';
    document.getElementById('inputPopularity').value=f.popularity_score;
    document.getElementById('inputDesc').value=f.description||'';
    document.getElementById('inputRestaurants').value=JSON.stringify(f.restaurants||[]);
    document.getElementById('inputImage').value=f.cover_image||'';
    document.getElementById('inputActive').checked=f.is_active;
    new bootstrap.Modal(document.getElementById('foodModal')).show();
}

async function saveFood(){
    const id=document.getElementById('editId').value;
    let restaurants=[];
    try{restaurants=JSON.parse(document.getElementById('inputRestaurants').value||'[]');}catch(e){return alert('餐厅JSON格式错误');}
    const body={
        name:document.getElementById('inputName').value,
        city:document.getElementById('inputCity').value,
        province:document.getElementById('inputProvince').value,
        category:document.getElementById('inputCategory').value,
        rating:parseFloat(document.getElementById('inputRating').value)||4.5,
        price_range:document.getElementById('inputPrice').value,
        popularity_score:parseFloat(document.getElementById('inputPopularity').value)||50,
        description:document.getElementById('inputDesc').value,
        restaurants:restaurants,
        cover_image:document.getElementById('inputImage').value,
        is_active:document.getElementById('inputActive').checked
    };
    if(!body.name) return alert('请输入美食名称');
    const url=id?`/api/v2/foods/${id}`:'/api/v2/foods';
    const method=id?'PUT':'POST';
    const res=await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await res.json();
    if(d.success){bootstrap.Modal.getInstance(document.getElementById('foodModal')).hide();loadFoods(curPage);}
    else alert(d.error||'保存失败');
}

async function deleteFood(id,name){
    if(!confirm(`确定删除美食「${name}」？`)) return;
    const res=await fetch(`/api/v2/foods/${id}`,{method:'DELETE'});
    const d=await res.json();
    if(d.success) loadFoods(curPage);
    else alert(d.error||'删除失败');
}

loadFoods(1);
</script>
{% endblock %}
