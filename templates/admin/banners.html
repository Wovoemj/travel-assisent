{% extends 'admin/layout.html' %}
{% block page_title %}轮播图管理{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0"><i class="fas fa-images me-2"></i>轮播图管理</h4>
    <button class="btn btn-primary" onclick="showAddModal()"><i class="fas fa-plus me-1"></i>添加轮播</button>
</div>

<div class="card">
    <div class="card-body p-0">
        <table class="table mb-0">
            <thead><tr><th>ID</th><th>标题</th><th>图片</th><th>链接</th><th>排序</th><th>状态</th><th>操作</th></tr></thead>
            <tbody id="bannerBody"></tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="bannerModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">添加轮播</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="mb-3">
                    <label class="form-label">标题</label>
                    <input type="text" class="form-control" id="inputTitle">
                </div>
                <div class="mb-3">
                    <label class="form-label">图片URL <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="inputImage" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">链接URL</label>
                    <input type="text" class="form-control" id="inputLink">
                </div>
                <div class="mb-3">
                    <label class="form-label">排序</label>
                    <input type="number" class="form-control" id="inputSort" value="0">
                </div>
                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" id="inputActive" checked>
                    <label class="form-check-label">启用</label>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveBanner()">保存</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
async function loadBanners(){
    const res=await fetch('/api/v2/banners');
    const d=await res.json();
    if(!d.success) return;
    document.getElementById('bannerBody').innerHTML=d.data.map(b=>`
        <tr>
            <td>${b.id}</td>
            <td>${b.title||'-'}</td>
            <td><img src="${b.image_url}" style="height:40px;border-radius:6px" onerror="this.src='/static/images/placeholder.jpg'"></td>
            <td>${b.link_url?'<a href="'+b.link_url+'" target="_blank">链接</a>':'-'}</td>
            <td>${b.sort_order}</td>
            <td><span class="badge bg-${b.is_active?'success':'secondary'}">${b.is_active?'启用':'禁用'}</span></td>
            <td>
                <button class="btn btn-sm btn-outline-primary btn-action" onclick="editBanner(${b.id})"><i class="fas fa-edit"></i></button>
                <button class="btn btn-sm btn-outline-danger btn-action" onclick="deleteBanner(${b.id})"><i class="fas fa-trash"></i></button>
            </td>
        </tr>
    `).join('');
}

function showAddModal(){
    document.getElementById('modalTitle').textContent='添加轮播';
    document.getElementById('editId').value='';
    document.getElementById('inputTitle').value='';
    document.getElementById('inputImage').value='';
    document.getElementById('inputLink').value='';
    document.getElementById('inputSort').value='0';
    document.getElementById('inputActive').checked=true;
    new bootstrap.Modal(document.getElementById('bannerModal')).show();
}

async function editBanner(id){
    const res=await fetch('/api/v2/banners');
    const d=await res.json();
    const b=d.data.find(x=>x.id===id);
    if(!b) return alert('未找到');
    document.getElementById('modalTitle').textContent='编辑轮播';
    document.getElementById('editId').value=b.id;
    document.getElementById('inputTitle').value=b.title||'';
    document.getElementById('inputImage').value=b.image_url;
    document.getElementById('inputLink').value=b.link_url||'';
    document.getElementById('inputSort').value=b.sort_order;
    document.getElementById('inputActive').checked=b.is_active;
    new bootstrap.Modal(document.getElementById('bannerModal')).show();
}

async function saveBanner(){
    const id=document.getElementById('editId').value;
    const body={
        title:document.getElementById('inputTitle').value,
        image_url:document.getElementById('inputImage').value,
        link_url:document.getElementById('inputLink').value,
        sort_order:parseInt(document.getElementById('inputSort').value)||0,
        is_active:document.getElementById('inputActive').checked
    };
    if(!body.image_url) return alert('请输入图片URL');
    const url=id?`/api/v2/banners/${id}`:'/api/v2/banners';
    const method=id?'PUT':'POST';
    const res=await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await res.json();
    if(d.success){bootstrap.Modal.getInstance(document.getElementById('bannerModal')).hide();loadBanners();}
    else alert(d.error||'保存失败');
}

async function deleteBanner(id){
    if(!confirm('确定删除此轮播？')) return;
    const res=await fetch(`/api/v2/banners/${id}`,{method:'DELETE'});
    const d=await res.json();
    if(d.success) loadBanners();
    else alert(d.error||'删除失败');
}

loadBanners();
</script>
{% endblock %}
