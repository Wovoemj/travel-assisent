{% extends 'admin/layout.html' %}
{% block page_title %}行程模板管理{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0"><i class="fas fa-route me-2"></i>行程模板管理</h4>
    <button class="btn btn-primary" onclick="showAddModal()"><i class="fas fa-plus me-1"></i>添加行程</button>
</div>

<div class="card mb-3">
    <div class="card-body">
        <div class="row g-2">
            <div class="col-md-3"><input type="text" class="form-control" id="filterCity" placeholder="按城市筛选..." onkeyup="loadTrips(1)"></div>
            <div class="col-md-2">
                <select class="form-select" id="filterDays" onchange="loadTrips(1)">
                    <option value="">全部天数</option>
                    <option value="1">1日游</option>
                    <option value="2">2日游</option>
                    <option value="3">3日游</option>
                    <option value="5">5日游</option>
                    <option value="7">7日游</option>
                </select>
            </div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-body p-0">
        <table class="table mb-0">
            <thead><tr><th>ID</th><th>标题</th><th>城市</th><th>天数</th><th>预算</th><th>状态</th><th>操作</th></tr></thead>
            <tbody id="tripBody"></tbody>
        </table>
    </div>
    <div class="card-footer bg-white d-flex justify-content-between">
        <span class="text-muted" id="totalInfo"></span>
    </div>
</div>

<div class="modal fade" id="tripModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">添加行程</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">城市 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="inputCity" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">省份</label>
                        <input type="text" class="form-control" id="inputProvince">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">天数 <span class="text-danger">*</span></label>
                        <input type="number" min="1" max="30" class="form-control" id="inputDays" value="3">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">标题 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="inputTitle" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">描述</label>
                    <textarea class="form-control" id="inputDesc" rows="2"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">行程内容（JSON数组）</label>
                    <textarea class="form-control" id="inputItinerary" rows="6" placeholder='[{"day":1,"title":"第一天","items":["上午：故宫","下午：天安门"]}]'></textarea>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">预算估计</label>
                        <input type="text" class="form-control" id="inputBudget" placeholder="如：¥2000-3000">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">最佳季节</label>
                        <input type="text" class="form-control" id="inputSeason" placeholder="如：春秋最佳">
                    </div>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="inputActive" checked>
                    <label class="form-check-label">启用</label>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveTrip()">保存</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let curPage=1;
async function loadTrips(page){
    curPage=page;
    let url=`/api/v2/trip-plans?page=${page}&per_page=20`;
    const city=document.getElementById('filterCity').value;
    const days=document.getElementById('filterDays').value;
    if(city) url+=`&city=${city}`;
    if(days) url+=`&days=${days}`;
    const res=await fetch(url);
    const d=await res.json();
    if(!d.success) return;
    document.getElementById('tripBody').innerHTML=d.data.map(t=>`
        <tr>
            <td>${t.id}</td>
            <td><strong>${t.title}</strong></td>
            <td>${t.city}</td>
            <td><span class="badge bg-primary">${t.days}天</span></td>
            <td>${t.budget_estimate||'-'}</td>
            <td><span class="badge bg-${t.is_active?'success':'secondary'}">${t.is_active?'启用':'禁用'}</span></td>
            <td>
                <button class="btn btn-sm btn-outline-primary btn-action" onclick="editTrip(${t.id})"><i class="fas fa-edit"></i></button>
                <button class="btn btn-sm btn-outline-danger btn-action" onclick="deleteTrip(${t.id},'${t.title}')"><i class="fas fa-trash"></i></button>
            </td>
        </tr>
    `).join('');
    document.getElementById('totalInfo').textContent=`共 ${d.total} 条`;
}

function showAddModal(){
    document.getElementById('modalTitle').textContent='添加行程';
    document.getElementById('editId').value='';
    ['inputCity','inputProvince','inputTitle','inputDesc','inputItinerary','inputBudget','inputSeason'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('inputDays').value='3';
    document.getElementById('inputActive').checked=true;
    new bootstrap.Modal(document.getElementById('tripModal')).show();
}

async function editTrip(id){
    const res=await fetch(`/api/v2/trip-plans/${id}`);
    const d=await res.json();
    if(!d.success) return alert('加载失败');
    const t=d.data;
    document.getElementById('modalTitle').textContent='编辑行程';
    document.getElementById('editId').value=t.id;
    document.getElementById('inputCity').value=t.city;
    document.getElementById('inputProvince').value=t.province||'';
    document.getElementById('inputTitle').value=t.title;
    document.getElementById('inputDays').value=t.days;
    document.getElementById('inputDesc').value=t.description||'';
    document.getElementById('inputItinerary').value=JSON.stringify(t.itinerary||[],null,2);
    document.getElementById('inputBudget').value=t.budget_estimate||'';
    document.getElementById('inputSeason').value=t.best_season||'';
    document.getElementById('inputActive').checked=t.is_active;
    new bootstrap.Modal(document.getElementById('tripModal')).show();
}

async function saveTrip(){
    const id=document.getElementById('editId').value;
    let itinerary=[];
    try{itinerary=JSON.parse(document.getElementById('inputItinerary').value||'[]');}catch(e){return alert('行程JSON格式错误');}
    const body={
        city:document.getElementById('inputCity').value,
        province:document.getElementById('inputProvince').value,
        title:document.getElementById('inputTitle').value,
        days:parseInt(document.getElementById('inputDays').value)||1,
        description:document.getElementById('inputDesc').value,
        itinerary:itinerary,
        budget_estimate:document.getElementById('inputBudget').value,
        best_season:document.getElementById('inputSeason').value,
        is_active:document.getElementById('inputActive').checked
    };
    if(!body.city||!body.title) return alert('请填写城市和标题');
    const url=id?`/api/v2/trip-plans/${id}`:'/api/v2/trip-plans';
    const method=id?'PUT':'POST';
    const res=await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await res.json();
    if(d.success){bootstrap.Modal.getInstance(document.getElementById('tripModal')).hide();loadTrips(curPage);}
    else alert(d.error||'保存失败');
}

async function deleteTrip(id,title){
    if(!confirm(`确定删除行程「${title}」？`)) return;
    const res=await fetch(`/api/v2/trip-plans/${id}`,{method:'DELETE'});
    const d=await res.json();
    if(d.success) loadTrips(curPage);
    else alert(d.error||'删除失败');
}

loadTrips(1);
</script>
{% endblock %}
