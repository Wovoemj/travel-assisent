{% extends 'admin/layout.html' %}
{% block page_title %}导航菜单管理{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0"><i class="fas fa-bars me-2"></i>导航菜单管理</h4>
    <button class="btn btn-primary" onclick="showAddModal()"><i class="fas fa-plus me-1"></i>添加导航</button>
</div>

<div class="card">
    <div class="card-body p-0">
        <table class="table mb-0">
            <thead><tr><th>ID</th><th>名称</th><th>URL</th><th>图标</th><th>位置</th><th>排序</th><th>状态</th><th>操作</th></tr></thead>
            <tbody id="navBody"></tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="navModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">添加导航</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="mb-3">
                    <label class="form-label">名称 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="inputName" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">URL</label>
                    <input type="text" class="form-control" id="inputUrl" placeholder="/">
                </div>
                <div class="mb-3">
                    <label class="form-label">图标（Emoji 或 FontAwesome 类名）</label>
                    <input type="text" class="form-control" id="inputIcon" placeholder="🏠">
                </div>
                <div class="mb-3">
                    <label class="form-label">位置</label>
                    <select class="form-select" id="inputPosition">
                        <option value="header">页头导航</option>
                        <option value="footer">页脚导航</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">排序</label>
                    <input type="number" class="form-control" id="inputSort" value="0">
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="inputActive" checked>
                    <label class="form-check-label">启用</label>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveNav()">保存</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
async function loadNavs(){
    const res=await fetch('/api/v2/navigations');
    const d=await res.json();
    if(!d.success) return;
    document.getElementById('navBody').innerHTML=d.data.map(n=>`
        <tr>
            <td>${n.id}</td>
            <td><strong>${n.name}</strong></td>
            <td><code>${n.url||'-'}</code></td>
            <td>${n.icon||'-'}</td>
            <td><span class="badge bg-${n.position==='header'?'primary':'secondary'}">${n.position==='header'?'页头':'页脚'}</span></td>
            <td>${n.sort_order}</td>
            <td><span class="badge bg-${n.is_active?'success':'secondary'}">${n.is_active?'启用':'禁用'}</span></td>
            <td>
                <button class="btn btn-sm btn-outline-primary btn-action" onclick="editNav(${n.id})"><i class="fas fa-edit"></i></button>
                <button class="btn btn-sm btn-outline-danger btn-action" onclick="deleteNav(${n.id},'${n.name}')"><i class="fas fa-trash"></i></button>
            </td>
        </tr>
    `).join('');
}

function showAddModal(){
    document.getElementById('modalTitle').textContent='添加导航';
    document.getElementById('editId').value='';
    document.getElementById('inputName').value='';
    document.getElementById('inputUrl').value='/';
    document.getElementById('inputIcon').value='';
    document.getElementById('inputPosition').value='header';
    document.getElementById('inputSort').value='0';
    document.getElementById('inputActive').checked=true;
    new bootstrap.Modal(document.getElementById('navModal')).show();
}

async function editNav(id){
    const res=await fetch('/api/v2/navigations');
    const d=await res.json();
    const n=d.data.find(x=>x.id===id);
    if(!n) return alert('未找到');
    document.getElementById('modalTitle').textContent='编辑导航';
    document.getElementById('editId').value=n.id;
    document.getElementById('inputName').value=n.name;
    document.getElementById('inputUrl').value=n.url||'';
    document.getElementById('inputIcon').value=n.icon||'';
    document.getElementById('inputPosition').value=n.position;
    document.getElementById('inputSort').value=n.sort_order;
    document.getElementById('inputActive').checked=n.is_active;
    new bootstrap.Modal(document.getElementById('navModal')).show();
}

async function saveNav(){
    const id=document.getElementById('editId').value;
    const body={
        name:document.getElementById('inputName').value,
        url:document.getElementById('inputUrl').value,
        icon:document.getElementById('inputIcon').value,
        position:document.getElementById('inputPosition').value,
        sort_order:parseInt(document.getElementById('inputSort').value)||0,
        is_active:document.getElementById('inputActive').checked
    };
    if(!body.name) return alert('请输入名称');
    const url=id?`/api/v2/navigations/${id}`:'/api/v2/navigations';
    const method=id?'PUT':'POST';
    const res=await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await res.json();
    if(d.success){bootstrap.Modal.getInstance(document.getElementById('navModal')).hide();loadNavs();}
    else alert(d.error||'保存失败');
}

async function deleteNav(id,name){
    if(!confirm(`确定删除导航「${name}」？`)) return;
    const res=await fetch(`/api/v2/navigations/${id}`,{method:'DELETE'});
    const d=await res.json();
    if(d.success) loadNavs();
    else alert(d.error||'删除失败');
}

loadNavs();
</script>
{% endblock %}
