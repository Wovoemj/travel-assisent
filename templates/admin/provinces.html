{% extends 'admin/layout.html' %}
{% block page_title %}省份管理{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0"><i class="fas fa-globe-asia me-2"></i>省份管理</h4>
    <button class="btn btn-primary" onclick="showAddModal()"><i class="fas fa-plus me-1"></i>添加省份</button>
</div>

<div class="card">
    <div class="card-body p-0">
        <table class="table mb-0" id="provinceTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>省份名称</th>
                    <th>排序</th>
                    <th>城市数</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="provinceBody"></tbody>
        </table>
    </div>
    <div class="card-footer bg-white" id="pagination"></div>
</div>

<!-- 添加/编辑弹窗 -->
<div class="modal fade" id="provinceModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">添加省份</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="mb-3">
                    <label class="form-label">省份名称 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="inputName" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">排序</label>
                    <input type="number" class="form-control" id="inputSort" value="0">
                </div>
                <div class="mb-3">
                    <label class="form-label">描述</label>
                    <textarea class="form-control" id="inputDesc" rows="3"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">封面图片URL</label>
                    <input type="text" class="form-control" id="inputImage">
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="inputActive" checked>
                    <label class="form-check-label">启用</label>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveProvince()">保存</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let currentPage = 1;
async function loadProvinces(page=1) {
    currentPage = page;
    const res = await fetch(`/api/v2/provinces?page=${page}&per_page=50`);
    const data = await res.json();
    if (!data.success) return;
    const tbody = document.getElementById('provinceBody');
    tbody.innerHTML = data.data.map(p => `
        <tr>
            <td>${p.id}</td>
            <td><strong>${p.name}</strong></td>
            <td>${p.sort_order}</td>
            <td>${p.cities_count || 0}</td>
            <td><span class="badge bg-${p.is_active ? 'success' : 'secondary'}">${p.is_active ? '启用' : '禁用'}</span></td>
            <td>
                <button class="btn btn-sm btn-outline-primary btn-action" onclick="editProvince(${p.id})"><i class="fas fa-edit"></i></button>
                <button class="btn btn-sm btn-outline-danger btn-action" onclick="deleteProvince(${p.id},'${p.name}')"><i class="fas fa-trash"></i></button>
            </td>
        </tr>
    `).join('');
    // pagination
    const pg = document.getElementById('pagination');
    pg.innerHTML = `<span class="text-muted">共 ${data.total} 条</span>`;
}

function showAddModal() {
    document.getElementById('modalTitle').textContent = '添加省份';
    document.getElementById('editId').value = '';
    document.getElementById('inputName').value = '';
    document.getElementById('inputSort').value = '0';
    document.getElementById('inputDesc').value = '';
    document.getElementById('inputImage').value = '';
    document.getElementById('inputActive').checked = true;
    new bootstrap.Modal(document.getElementById('provinceModal')).show();
}

async function editProvince(id) {
    const res = await fetch(`/api/v2/provinces/${id}`);
    const data = await res.json();
    if (!data.success) return alert('加载失败');
    const p = data.data;
    document.getElementById('modalTitle').textContent = '编辑省份';
    document.getElementById('editId').value = p.id;
    document.getElementById('inputName').value = p.name;
    document.getElementById('inputSort').value = p.sort_order;
    document.getElementById('inputDesc').value = p.description || '';
    document.getElementById('inputImage').value = p.cover_image || '';
    document.getElementById('inputActive').checked = p.is_active;
    new bootstrap.Modal(document.getElementById('provinceModal')).show();
}

async function saveProvince() {
    const id = document.getElementById('editId').value;
    const body = {
        name: document.getElementById('inputName').value,
        sort_order: parseInt(document.getElementById('inputSort').value) || 0,
        description: document.getElementById('inputDesc').value,
        cover_image: document.getElementById('inputImage').value,
        is_active: document.getElementById('inputActive').checked
    };
    if (!body.name) return alert('请输入省份名称');
    const url = id ? `/api/v2/provinces/${id}` : '/api/v2/provinces';
    const method = id ? 'PUT' : 'POST';
    const res = await fetch(url, {method, headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
    const data = await res.json();
    if (data.success) {
        bootstrap.Modal.getInstance(document.getElementById('provinceModal')).hide();
        loadProvinces(currentPage);
    } else { alert(data.error || '保存失败'); }
}

async function deleteProvince(id, name) {
    if (!confirm(`确定删除省份「${name}」？`)) return;
    const res = await fetch(`/api/v2/provinces/${id}`, {method:'DELETE'});
    const data = await res.json();
    if (data.success) loadProvinces(currentPage);
    else alert(data.error || '删除失败');
}

loadProvinces();
</script>
{% endblock %}
