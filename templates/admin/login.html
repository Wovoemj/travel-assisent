<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 智能旅游助手</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .login-card {
            background: white;
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-header .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }
        .login-header .logo i {
            font-size: 2.5rem;
            color: white;
        }
        .login-header h2 {
            font-weight: 600;
            color: #333;
            margin-bottom: 0.5rem;
        }
        .login-header p {
            color: #666;
            font-size: 0.9rem;
        }
        .form-control {
            border: 2px solid #e9ecef;
            border-radius: 16px;
            padding: 0.8rem 1.2rem;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .input-group-text {
            border: 2px solid #e9ecef;
            border-radius: 16px 0 0 16px;
            background: white;
            color: #667eea;
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 16px;
            padding: 0.8rem;
            font-weight: 600;
            color: white;
            width: 100%;
            transition: all 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .alert {
            border-radius: 16px;
            border: none;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div class="logo">
                <i class="fas fa-compass"></i>
            </div>
            <h2>管理后台</h2>
            <p>智能旅游助手 · 管理员登录</p>
        </div>

        {% if error %}
        <div class="alert alert-danger">
            <i class="fas fa-exclamation-circle me-2"></i>
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <div class="mb-4">
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control" name="username" placeholder="用户名" required>
                </div>
            </div>
<!-- 密码输入框 -->
<div class="mb-4 position-relative">
    <div class="input-group">
        <span class="input-group-text"><i class="fas fa-lock"></i></span>
        <input type="password" class="form-control" name="password" id="adminPassword" placeholder="密码" required>
        <button class="btn btn-outline-secondary" type="button" onclick="toggleAdminPassword()">
            <i class="fas fa-eye" id="adminToggleIcon"></i>
        </button>
    </div>
</div>
            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt me-2"></i>登录
            </button>
        </form>

        <div class="text-center mt-4">
            <a href="/" class="text-decoration-none text-muted">
                <i class="fas fa-arrow-left me-1"></i>返回首页
            </a>
        </div>
    </div>
<script>
    function toggleAdminPassword() {
        const passwordInput = document.getElementById('adminPassword');
        const toggleIcon = document.getElementById('adminToggleIcon');

        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.className = 'fas fa-eye-slash';
        } else {
            passwordInput.type = 'password';
            toggleIcon.className = 'fas fa-eye';
        }
    }
</script>
</body>
</html>
