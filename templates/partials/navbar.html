<!-- partials/navbar.html - 通用导航栏组件 -->
<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="/">
            <div class="gradient-bg p-2 rounded-3 me-2">
                <i class="fas fa-compass text-white"></i>
            </div>
            <span class="fw-bold">智能旅游助手</span>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link {% if active_page == 'home' %}active{% endif %}" href="/">首页</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if active_page == 'chat' %}active{% endif %}" href="/chat">智能助手</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if active_page == 'hot' %}active{% endif %}" href="/?view=hot">热门景点</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if active_page == 'about' %}active{% endif %}" href="/about">关于</a>
                </li>
            </ul>

            <!-- 搜索框 -->
            <div class="position-relative me-3" style="width: 300px;">
                <form action="/search" method="GET" id="searchForm">
                    <div class="input-group">
                        <input type="search" name="q" id="searchInput" class="form-control rounded-pill"
                               placeholder="搜索景点、城市..." autocomplete="off">
                        <button class="btn btn-primary rounded-pill ms-2" type="submit">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                </form>
                <div class="search-suggestions" id="searchSuggestions"></div>
            </div>

            <!-- 用户区域 -->
            <div class="d-flex align-items-center">
                {% if current_user %}
                    <div class="dropdown">
                        <button class="btn btn-light dropdown-toggle d-flex align-items-center" type="button" data-bs-toggle="dropdown">
                            <div class="gradient-bg text-white rounded-circle d-flex align-items-center justify-content-center me-2"
                                 style="width: 32px; height: 32px; font-size: 0.9rem;">
                                {{ current_user.username[0]|upper }}
                            </div>
                            <span class="d-none d-md-inline">{{ current_user.username }}</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="/profile-page"><i class="fas fa-user me-2 text-primary"></i>个人中心</a></li>
                            <li><a class="dropdown-item" href="/profile-page"><i class="fas fa-heart me-2 text-danger"></i>我的收藏</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><button class="dropdown-item text-danger" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i>退出登录</button></li>
                        </ul>
                    </div>
                {% else %}
                    <a href="/login-page" class="btn btn-outline-primary me-2">登录</a>
                    <a href="/register-page" class="btn btn-primary text-white">注册</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>
