{% extends "base.html" %}

{% block content %}
<div class="container">
    <h1>热门景点排行榜</h1>
    <div class="row">
        {% for dest in destinations %}
        <div class="col-md-4 mb-4">
            <a href="{{ url_for('dest_detail', dest_id=dest.id) }}" class="text-decoration-none text-dark">
                <div class="card h-100">
                    {% if dest.cover_image %}
                    <img src="{{ dest.cover_image }}"
                         class="card-img-top"
                         alt="{{ dest.name }}"
                         onerror="this.onerror=null; this.src='{{ url_for('static', filename='images/placeholder.jpg') }}'"
                         style="height: 200px; object-fit: cover;">
                    {% else %}
                    <div class="card-img-top bg-secondary text-white d-flex align-items-center justify-content-center" style="height: 200px;">
                        <span>暂无图片</span>
                    </div>
                    {% endif %}
                    <div class="card-body">
                        <h5 class="card-title">{{ dest.name }}</h5>
                        <p class="card-text">{{ dest.city }} · {{ dest.province }}</p>
                        <p class="card-text">评分: {{ dest.rating }}/5</p>
                    </div>
                    <div class="card-footer">
                        <span class="btn btn-primary w-100">查看详情</span>
                    </div>
                </div>
            </a>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
